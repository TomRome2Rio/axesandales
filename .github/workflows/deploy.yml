name: Deploy to GitHub Pages

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    outputs:
      rules-changed: ${{ steps.filter.outputs.rules }}
      functions-changed: ${{ steps.filter.outputs.functions }}
      indexes-changed: ${{ steps.filter.outputs.indexes }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rules:
              - 'firestore.rules'
            indexes:
              - 'firestore.indexes.json'
            functions:
              - 'functions/**'

  deploy-firestore-rules:
    needs: [detect-changes, validate-firestore-rules]
    if: needs.detect-changes.outputs.rules-changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Deploy Firestore rules
        uses: w9jds/firebase-action@v14.3.0
        with:
          args: deploy --only firestore:rules --project=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

  validate-firestore-rules:
    needs: detect-changes
    if: needs.detect-changes.outputs.rules-changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Validate Firestore rules
        run: npx --yes firebase-tools@latest emulators:exec --only firestore --project demo-axesandales "node -e \"console.log('Firestore rules compiled')\""

  deploy-firestore-indexes:
    needs: detect-changes
    if: needs.detect-changes.outputs.indexes-changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Deploy Firestore indexes
        uses: w9jds/firebase-action@v14.3.0
        with:
          args: deploy --only firestore:indexes --project=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

  deploy-functions:
    needs: detect-changes
    if: needs.detect-changes.outputs.functions-changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: functions
      - name: Lint
        run: npm run lint
        working-directory: functions
      - name: Build
        run: npm run build
        working-directory: functions
      - name: Deploy to Firebase
        uses: w9jds/firebase-action@v14.3.0
        with:
          args: deploy --only functions --project=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

  build-and-deploy:
    needs: [detect-changes, validate-firestore-rules, deploy-firestore-rules, deploy-firestore-indexes, deploy-functions]
    if: always() && !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Write environment file from secrets
        run: |
          echo "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}" >> .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}" >> .env
          echo "VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}" >> .env
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}" >> .env
          echo "VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}" >> .env
          echo "VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}" >> .env
          echo "VITE_GOOGLE_MAPS_EMBED_KEY=${{ secrets.VITE_GOOGLE_MAPS_EMBED_KEY }}" >> .env
      - run: npm run build
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
